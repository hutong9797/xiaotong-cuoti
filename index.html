<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晓彤的错题本</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --primary: #4f6ef7;
  --primary-hover: #3b5de7;
  --primary-light: #eef1fe;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --success: #10b981;
  --success-light: #ecfdf5;
  --warning: #f59e0b;
  --warning-light: #fffbeb;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: .2s ease;
  --sidebar-w: 240px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== Auth Section ===== */
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 20px;
}
.auth-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
}
.auth-card .brand { text-align: center; margin-bottom: 28px; }
.auth-card .brand-icon {
  width: 56px; height: 56px;
  background: var(--primary);
  border-radius: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff; margin-bottom: 12px;
}
.auth-card .brand h2 { font-size: 22px; font-weight: 700; }
.auth-card .brand p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.auth-tabs {
  display: flex; gap: 0; margin-bottom: 24px;
  border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden;
}
.auth-tab {
  flex: 1; padding: 10px; text-align: center; cursor: pointer;
  font-size: 14px; font-weight: 600; border: none; background: none;
  color: var(--text-secondary); transition: var(--transition); font-family: inherit;
}
.auth-tab.active { background: var(--primary); color: #fff; }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-form input {
  padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; outline: none; font-family: inherit; transition: var(--transition);
}
.auth-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.12); }
.auth-btn {
  padding: 12px; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: var(--primary); color: #fff; transition: var(--transition);
  font-family: inherit;
}
.auth-btn:hover { background: var(--primary-hover); }
.auth-btn:disabled { opacity: .5; cursor: not-allowed; }
.auth-error {
  font-size: 13px; color: var(--danger); background: var(--danger-light);
  padding: 8px 12px; border-radius: 6px; display: none;
}
.auth-error.show { display: block; }
.auth-hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 8px; }
.auth-logout { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 10px;
  border-radius: 6px; font-size: 12px; color: var(--text-secondary); background: none;
  border: none; font-family: inherit; transition: var(--transition); }
.auth-logout:hover { background: #f3f4f6; color: var(--danger); }

/* ===== Layout ===== */
.app-layout { display: flex; min-height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--card-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100; overflow-y: auto;
  transition: transform .25s ease;
}
.sidebar-brand {
  padding: 24px 20px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-brand .brand-icon {
  width: 36px; height: 36px; background: var(--primary); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; flex-shrink: 0;
}
.sidebar-brand .brand-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
.sidebar-section-title {
  padding: 18px 20px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); font-weight: 600;
}
.sidebar-notebooks {
  flex: 1; padding: 0 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto;
}
.nb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--text-secondary);
  transition: var(--transition); position: relative; user-select: none;
}
.nb-item:hover { background: #f3f4f6; color: var(--text); }
.nb-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nb-item .nb-icon { font-size: 16px; flex-shrink: 0; opacity: .7; }
.nb-item.active .nb-icon { opacity: 1; color: var(--primary); }
.nb-item .nb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nb-item .nb-badge {
  font-size: 12px; background: #f3f4f6; padding: 2px 8px; border-radius: 10px;
  color: var(--text-secondary); font-weight: 500; min-width: 24px; text-align: center; flex-shrink: 0;
}
.nb-item.active .nb-badge { background: #dde3fd; color: var(--primary); }
.nb-item .nb-delete {
  display: none; font-size: 16px; line-height: 1; cursor: pointer;
  color: var(--text-muted); flex-shrink: 0; padding: 2px; border-radius: 4px;
}
.nb-item:hover .nb-delete { display: block; }
.nb-item .nb-delete:hover { color: var(--danger); background: #fde8e8; }
.nb-item.active .nb-delete { color: var(--danger); }
.sidebar-add-btn {
  margin: 6px 12px 12px; padding: 9px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  background: transparent; border: 1.5px dashed var(--border);
  color: var(--text-secondary); text-align: center;
  transition: var(--transition); font-family: inherit;
}
.sidebar-add-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }

/* ===== Main Content ===== */
.main-content { flex: 1; margin-left: var(--sidebar-w); padding: 24px 32px 40px; min-width: 0; }
.main-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
.main-header h1 { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -.5px; }
.main-header .subtitle { font-size: 14px; color: var(--text-secondary); display: block; margin-top: 2px; }
.hamburger {
  display: none; width: 36px; height: 36px; align-items: center; justify-content: center;
  border: none; background: none; cursor: pointer; font-size: 24px; color: var(--text); border-radius: 8px;
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 99; }

/* ===== Tabs ===== */
.view-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--card-bg); border-radius: 10px; padding: 4px;
  box-shadow: var(--shadow-sm); border: 1px solid var(--border);
}
.view-tab {
  flex: 1; padding: 10px 16px; text-align: center; cursor: pointer;
  font-size: 14px; font-weight: 600; border: none; background: none;
  color: var(--text-secondary); border-radius: 8px; transition: var(--transition);
  font-family: inherit;
}
.view-tab:hover { color: var(--text); background: #f3f4f6; }
.view-tab.active { background: var(--primary); color: #fff; }
.view-panel { display: none; }
.view-panel.active { display: block; }

/* ===== Settings Panel ===== */
.settings-panel {
  background: var(--card-bg); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px;
  box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: none; animation: slideDown .25s ease;
}
.settings-panel.open { display: block; }
.settings-panel label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.settings-panel .input-row { display: flex; gap: 10px; }
.settings-panel input {
  flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; outline: none; font-family: inherit; transition: var(--transition);
}
.settings-panel input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.12); }
.settings-panel .hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
.settings-panel .status { font-size: 13px; margin-top: 8px; padding: 6px 10px; border-radius: 6px; display: inline-block; }
.settings-panel .status.saved { background: #ecfdf5; color: #065f46; }
.settings-panel .status.empty { background: #fefce8; color: #92400e; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
  border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: var(--transition); font-family: inherit; white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f9fafb; }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-danger:hover { background: #fde8e8; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

/* ===== Upload Zone ===== */
.upload-zone {
  background: var(--card-bg); border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 36px 24px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 20px;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
.upload-zone .upload-icon { font-size: 40px; margin-bottom: 8px; color: var(--text-muted); }
.upload-zone.drag-over .upload-icon { color: var(--primary); }
.upload-zone .upload-text { font-size: 15px; font-weight: 500; color: var(--text-secondary); }
.upload-zone .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

/* ===== Preview & Loading ===== */
.preview-area { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: none; }
.preview-area.active { display: block; }
.preview-area img { max-width: 100%; max-height: 300px; border-radius: 8px; display: block; margin: 0 auto 12px; }
.preview-area .preview-actions { display: flex; gap: 10px; justify-content: center; }
.loading-area { background: var(--card-bg); border-radius: var(--radius); padding: 32px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: none; text-align: center; }
.loading-area.active { display: block; }
.loading-area .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-area .loading-text { font-size: 14px; color: var(--text-secondary); }

/* ===== Stats Dashboard ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow-sm); border: 1px solid var(--border); text-align: center;
}
.stat-card .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-card .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.stat-card.accent { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
.stat-card.accent .stat-value { color: #fff; }
.stat-card.accent .stat-label { color: rgba(255,255,255,.7); }
.stats-charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.chart-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow-sm); border: 1px solid var(--border);
}
.chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 13px; color: var(--text-secondary); min-width: 80px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 24px; background: #f3f4f6; border-radius: 6px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 6px; transition: width .6s ease; min-width: 2px; display: flex; align-items: center; padding-left: 8px; }
.bar-fill .bar-count { font-size: 11px; color: #fff; font-weight: 600; }
.bar-fill.blue { background: linear-gradient(90deg, #4f6ef7, #667eea); }
.bar-fill.purple { background: linear-gradient(90deg, #764ba2, #9b59b6); }
.bar-fill.green { background: linear-gradient(90deg, #10b981, #34d399); }
.bar-fill.orange { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.bar-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }
.recent-list { display: flex; flex-direction: column; gap: 8px; }
.recent-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: #f9fafb; }
.recent-item .ri-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.recent-item .ri-text { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-item .ri-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

/* ===== Card Grid ===== */
.card-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.card-toolbar input {
  flex: 1; min-width: 180px; padding: 9px 14px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 14px; outline: none; font-family: inherit;
}
.card-toolbar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,110,247,.12); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.mistake-card {
  background: var(--card-bg); border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: var(--transition);
}
.mistake-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.card-top { display: flex; gap: 14px; padding: 16px; }
.card-thumb {
  width: 80px; height: 80px; object-fit: cover; border-radius: 8px;
  cursor: pointer; flex-shrink: 0; background: #f3f4f6;
}
.card-info { flex: 1; min-width: 0; }
.card-ocr { font-size: 13px; color: var(--text); line-height: 1.5; max-height: 60px; overflow: hidden; margin-bottom: 8px; word-break: break-all; }
.card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.card-analysis { font-size: 12px; color: var(--text-secondary); line-height: 1.5; max-height: 48px; overflow: hidden; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 1px solid var(--border); background: #fafbfc; }
.card-time { font-size: 12px; color: var(--text-muted); }
.card-actions { display: flex; gap: 6px; }

/* ===== Tags ===== */
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.tag-notebook { background: #ede9fe; color: #7c3aed; }
.tag-subject { background: #dbeafe; color: #2563eb; }
.tag-difficulty { background: #f3f4f6; color: var(--text-secondary); }
.tag-difficulty.easy { background: #dcfce7; color: #16a34a; }
.tag-difficulty.hard { background: #fee2e2; color: #dc2626; }
.tag-kp { background: #fef3c7; color: #d97706; }

/* ===== Detail Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-content {
  background: var(--card-bg); border-radius: 16px; width: 100%; max-width: 600px;
  max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); padding: 24px;
}
.modal-content h3 { font-size: 18px; margin-bottom: 16px; }
.modal-content .detail-img { width: 100%; border-radius: 8px; margin-bottom: 16px; }
.detail-section { margin-bottom: 16px; }
.detail-section h4 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.detail-section p { font-size: 14px; line-height: 1.7; color: var(--text); }
.detail-section .tag-row { display: flex; flex-wrap: wrap; gap: 4px; }
.modal-close { float: right; font-size: 24px; cursor: pointer; color: var(--text-muted); border: none; background: none; padding: 4px; }
.modal-close:hover { color: var(--text); }

/* ===== Image Modal ===== */
.image-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
  z-index: 300; align-items: center; justify-content: center; cursor: pointer;
}
.image-modal.open { display: flex; }
.image-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }

/* ===== Empty State ===== */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
.empty-state .empty-text { font-size: 15px; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 24px; right: 24px; z-index: 400;
  padding: 12px 20px; border-radius: 8px;
  font-size: 14px; font-weight: 500;
  background: var(--text); color: #fff;
  box-shadow: var(--shadow-lg);
  transform: translateX(120%); transition: transform .3s ease;
}
.toast.show { transform: translateX(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* ===== Animations ===== */
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .main-content { margin-left: 0; padding: 16px; }
  .hamburger { display: flex; }
  .card-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-charts { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ===== Auth Section ===== -->
<div id="auth-section" class="auth-container">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">📒</div>
      <h2>晓彤的错题本</h2>
      <p>登录后数据云端同步，多设备通用</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">注册</button>
    </div>
    <div class="auth-form" id="auth-form">
      <input type="email" id="auth-email" placeholder="邮箱地址" autocomplete="email">
      <input type="password" id="auth-password" placeholder="密码（至少6位）" autocomplete="current-password">
      <div class="auth-error" id="auth-error"></div>
      <button class="auth-btn" id="auth-submit" onclick="handleAuth()">登录</button>
    </div>
    <div class="auth-hint">首次使用？先注册再登录即可</div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div id="app-section" style="display:none">
<div class="app-layout">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">📒</div>
    <div>
      <div class="brand-name">错题本</div>
    </div>
  </div>
  <div class="sidebar-section-title">错题本</div>
  <div class="sidebar-notebooks" id="notebook-list"></div>
  <button class="sidebar-add-btn" id="add-nb-btn">+ 新建错题本</button>
  <div class="sidebar-footer">
    <button class="auth-logout" id="settings-btn" onclick="toggleSettings()">⚙️ API 设置</button>
    <button class="auth-logout" id="logout-btn" onclick="handleLogout()">🚪 退出登录</button>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<main class="main-content" id="main-content">
  <div class="main-header">
    <div>
      <button class="hamburger" id="hamburger" onclick="openSidebar()">☰</button>
      <h1 id="page-title">全部错题</h1>
      <span class="subtitle" id="page-subtitle"></span>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settings-panel">
    <label>DeepSeek API Key</label>
    <div class="input-row">
      <input type="password" id="api-key-input" placeholder="sk-...">
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">保存</button>
    </div>

  <!-- View Tabs -->
  <div class="view-tabs">

  <!-- Upload View -->
  <div class="view-panel active" id="view-upload">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" style="display:none">
      <div class="upload-icon">📷</div>
      <div class="upload-text">点击或拖拽上传错题截图</div>
      <div class="upload-hint">支持 JPG / PNG / WebP，最大 10MB</div>
    </div>
    <div class="preview-area" id="preview-area">
      <img id="preview-img" src="" alt="预览">
      <div id="preview-size" style="text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:12px"></div>
      <div class="preview-actions">
        <button class="btn btn-primary" id="analyze-btn" onclick="doAnalyze()">🔍 开始分析</button>
        <button class="btn btn-outline" onclick="resetPreview()">取消</button>
      </div>
    </div>
    <div class="loading-area" id="loading-area">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">正在分析...</div>
    </div>
  </div>

  <!-- List View -->
  <div class="view-panel" id="view-list">
    <div class="card-toolbar">
      <input type="text" id="search-input" placeholder="搜索错题...">
      <button class="btn btn-danger btn-sm" id="clear-all-btn" style="display:none" onclick="clearAll()">清空</button>
    </div>
    <div class="card-grid" id="card-grid"></div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text" id="empty-text">还没有错题，上传第一张截图开始吧</div>
    </div>
  </div>

  <!-- Stats View -->
  <div class="view-panel" id="view-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="stats-charts" id="stats-charts"></div>
  </div>

</main>
</div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-content" id="detail-content"></div>
</div>

<div class="image-modal" id="image-modal">
  <img id="modal-img" src="" alt="大图">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ===== Supabase Config =====
  // TODO: 替换为你自己的 Supabase 项目信息
  var SUPABASE_URL = 'https://cgcjqfuxmqjmyhsnxlvk.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnY2pxZnV4bXFqbXloc254bHZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODE2MDksImV4cCI6MjA5NTM1NzYwOX0.OElPSYCyErST7f9z8yCN3nUbqtvJ1OgsVZUE6E8q1cU';
  var supabaseClient = null;
  var currentUser = null;
  var DEEPSEEK_API = 'https://api.deepseek.com/chat/completions';
  var MAX_IMAGE_BASE64 = 700000;
  var isProcessing = false;
  var currentImageBase64 = null;

  // ===== Local cache =====
  var notebooks = [];
  var questions = [];
  var activeNotebookId = null;
  var apiKey = '';

  // ===== Init Supabase =====
  function initSupabase() {
    if (SUPABASE_URL === 'YOUR_SUPABASE_URL' || !SUPABASE_URL) {
      showToast('请先配置 Supabase 信息', 'error');
      return false;
    }
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
  }

  // ===== Auth =====
  var authMode = 'login';

  window.switchAuthTab = function(mode) {
    authMode = mode;
    document.getElementById('tab-login').classList.toggle('active', mode === 'login');
    document.getElementById('tab-register').classList.toggle('active', mode === 'register');
    document.getElementById('auth-submit').textContent = mode === 'login' ? '登录' : '注册';
    document.getElementById('auth-error').classList.remove('show');
  };

  window.handleAuth = async function() {
    var email = document.getElementById('auth-email').value.trim();
    var password = document.getElementById('auth-password').value;
    var errEl = document.getElementById('auth-error');
    errEl.classList.remove('show');

    if (!email || !password) { errEl.textContent = '请填写邮箱和密码'; errEl.classList.add('show'); return; }
    if (password.length < 6) { errEl.textContent = '密码至少6位'; errEl.classList.add('show'); return; }

    var btn = document.getElementById('auth-submit');
    btn.disabled = true; btn.textContent = '处理中...';

    try {
      if (!supabaseClient && !initSupabase()) return;
      var result;
      if (authMode === 'register') {
        result = await supabaseClient.auth.signUp({ email: email, password: password });
      } else {
        result = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
      }
      if (result.error) throw result.error;
      if (authMode === 'register' && result.data.user && !result.data.session) {
        errEl.textContent = '注册成功！请去邮箱确认后登录';
        errEl.classList.add('show');
        switchAuthTab('login');
      }
    } catch(e) {
      errEl.textContent = e.message || '操作失败';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = authMode === 'login' ? '登录' : '注册';
    }
  };

  window.handleLogout = async function() {
    if (!confirm('确定退出登录？')) return;
    if (supabaseClient) await supabaseClient.auth.signOut();
    currentUser = null;
    showAuth();
  };

  function showAuth() {
    document.getElementById('auth-section').style.display = 'flex';
    document.getElementById('app-section').style.display = 'none';
  }

  function showApp() {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('app-section').style.display = 'block';
    loadAllData();
  }

  // ===== Data Layer (Supabase) =====
  async function loadAllData() {
    await Promise.all([loadNotebooks(), loadQuestions(), loadSettings()]);
    renderNotebookList();
    renderQuestionList();
    renderStats();
  }

  async function loadNotebooks() {
    if (!supabaseClient || !currentUser) return;
    var { data, error } = await supabaseClient
      .from('notebooks')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: true });
    if (error) { console.error('加载错题本失败:', error); return; }
    notebooks = data || [];
    if (notebooks.length === 0) {
      await createNotebook('默认错题本');
    }
  }

  async function loadQuestions() {
    if (!supabaseClient || !currentUser) return;
    var { data, error } = await supabaseClient
      .from('questions')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });
    if (error) { console.error('加载错题失败:', error); return; }
    questions = data || [];
  }

  async function loadSettings() {
    if (!supabaseClient || !currentUser) return;
    var { data, error } = await supabaseClient
      .from('user_settings')
      .select('*')
      .eq('user_id', currentUser.id)
      .single();
    if (data && data.deepseek_api_key) {
      apiKey = data.deepseek_api_key;
      document.getElementById('api-key-input').value = apiKey;
      updateSettingsStatus(true);
    } else {
      apiKey = '';
      updateSettingsStatus(false);
    }
  }

  async function createNotebook(name) {
    if (!supabaseClient || !currentUser) return;
    var { data, error } = await supabaseClient
      .from('notebooks')
      .insert({ user_id: currentUser.id, name: name })
      .select()
      .single();
    if (error) { console.error('创建错题本失败:', error); showToast('创建失败', 'error'); return null; }
    notebooks.push(data);
    renderNotebookList();
    return data;
  }

  async function deleteNotebook(id) {
    if (!supabaseClient || !currentUser) return;
    // 先删除该错题本下的所有错题
    await supabaseClient.from('questions').delete().eq('notebook_id', id).eq('user_id', currentUser.id);
    var { error } = await supabaseClient.from('notebooks').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) { showToast('删除失败', 'error'); return; }
    notebooks = notebooks.filter(function(n) { return n.id !== id; });
    questions = questions.filter(function(q) { return q.notebook_id !== id; });
    if (activeNotebookId === id) activeNotebookId = null;
    renderNotebookList();
    renderQuestionList();
    renderStats();
    showToast('已删除');
  }

  async function saveQuestion(nbId, imgB64, ocrText, subject, kps, difficulty, analysis, errorReason, correctApproach) {
    if (!supabaseClient || !currentUser) return;
    var insertData = {
      user_id: currentUser.id,
      notebook_id: nbId,
      image_base64: imgB64,
      ocr_text: ocrText,
      subject: subject,
      knowledge_points: kps,
      difficulty: difficulty,
      analysis: analysis,
      error_reason: errorReason || '',
      correct_approach: correctApproach || '',
      review_count: 0
    };
    var { data, error } = await supabaseClient
      .from('questions')
      .insert(insertData)
      .select()
      .single();
    if (error) { console.error('保存失败:', error); showToast('保存失败', 'error'); return; }
    questions.unshift(data);
    renderNotebookList();
    renderQuestionList();
    renderStats();
  }

  async function deleteQuestion(id) {
    if (!supabaseClient || !currentUser) return;
    var { error } = await supabaseClient.from('questions').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) { showToast('删除失败', 'error'); return; }
    questions = questions.filter(function(q) { return q.id !== id; });
    renderNotebookList();
    renderQuestionList();
    renderStats();
    showToast('已删除');
  }

  window.saveApiKey = async function() {
    var key = document.getElementById('api-key-input').value.trim();
    if (!supabaseClient || !currentUser) return;
    var { error } = await supabaseClient
      .from('user_settings')
      .upsert({ user_id: currentUser.id, deepseek_api_key: key, updated_at: new Date().toISOString() });
    if (error) { showToast('保存失败', 'error'); return; }
    apiKey = key;
    updateSettingsStatus(!!key);
    showToast('API Key 已保存', 'success');
  };

  function updateSettingsStatus(hasKey) {
    var el = document.getElementById('api-key-status');
    if (hasKey) { el.textContent = '✓ 已配置'; el.className = 'status saved'; }
    else { el.textContent = '未配置'; el.className = 'status empty'; }
  }

  // ===== View Switching =====
  window.switchView = function(view) {
    document.querySelectorAll('.view-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.view === view);
    });
    document.querySelectorAll('.view-panel').forEach(function(p) {
      p.classList.toggle('active', p.id === 'view-' + view);
    });
    if (view === 'stats') renderStats();
  };

  window.toggleSettings = function() {
    document.getElementById('settings-panel').classList.toggle('open');
  };

  // ===== Sidebar =====
  function renderNotebookList() {
    var container = document.getElementById('notebook-list');
    container.innerHTML = '';
    var allItem = document.createElement('div');
    allItem.className = 'nb-item' + (activeNotebookId === null ? ' active' : '');
    allItem.innerHTML = '<span class="nb-icon">📚</span><span class="nb-name">全部错题</span><span class="nb-badge">' + questions.length + '</span>';
    allItem.onclick = function() { activeNotebookId = null; updatePageTitle(); renderNotebookList(); renderQuestionList(); closeSidebar(); };
    container.appendChild(allItem);

    notebooks.forEach(function(nb) {
      var count = questions.filter(function(q) { return q.notebook_id === nb.id; }).length;
      var item = document.createElement('div');
      item.className = 'nb-item' + (activeNotebookId === nb.id ? ' active' : '');
      item.innerHTML = '<span class="nb-icon">📖</span><span class="nb-name">' + esc(nb.name) + '</span>' +
        '<span class="nb-badge">' + count + '</span>' +
        '<span class="nb-delete" title="删除" data-nb-id="' + nb.id + '">✕</span>';
      item.querySelector('.nb-name').onclick = function() { activeNotebookId = nb.id; updatePageTitle(); renderNotebookList(); renderQuestionList(); closeSidebar(); };
      item.querySelector('.nb-icon').onclick = function() { activeNotebookId = nb.id; updatePageTitle(); renderNotebookList(); renderQuestionList(); closeSidebar(); };
      item.querySelector('.nb-delete').onclick = function(e) {
        e.stopPropagation();
        if (confirm('确定删除「' + nb.name + '」及其所有错题？')) deleteNotebook(nb.id);
      };
      container.appendChild(item);
    });
  }

  function updatePageTitle() {
    var title = document.getElementById('page-title');
    var sub = document.getElementById('page-subtitle');
    if (activeNotebookId === null) {
      title.textContent = '全部错题';
      sub.textContent = '';
    } else {
      var nb = notebooks.find(function(n) { return n.id === activeNotebookId; });
      title.textContent = nb ? nb.name : '错题本';
      var count = questions.filter(function(q) { return q.notebook_id === activeNotebookId; }).length;
      sub.textContent = count + ' 道错题';
    }
  }

  document.getElementById('add-nb-btn').addEventListener('click', async function() {
    var name = prompt('错题本名称：');
    if (!name || !name.trim()) return;
    await createNotebook(name.trim());
  });

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
  window.openSidebar = openSidebar;
  window.closeSidebar = closeSidebar;

  // ===== Question List =====
  function renderQuestionList() {
    var grid = document.getElementById('card-grid');
    var emptyState = document.getElementById('empty-state');
    var emptyText = document.getElementById('empty-text');
    var clearBtn = document.getElementById('clear-all-btn');
    var searchVal = document.getElementById('search-input').value.trim().toLowerCase();

    var filtered = activeNotebookId === null ? questions : questions.filter(function(q) { return q.notebook_id === activeNotebookId; });
    var searched = searchVal ? filtered.filter(function(q) {
      return (q.ocr_text || '').toLowerCase().includes(searchVal) ||
        (q.subject || '').toLowerCase().includes(searchVal) ||
        (q.analysis || '').toLowerCase().includes(searchVal) ||
        (q.error_reason || '').toLowerCase().includes(searchVal) ||
        parseKP(q.knowledge_points).some(function(kp) { return kp.toLowerCase().includes(searchVal); });
    }) : filtered;

    grid.innerHTML = '';
    if (searched.length === 0) {
      emptyState.style.display = 'block';
      emptyText.textContent = searchVal ? '暂无匹配，试试其他关键词' : '还没有错题，上传截图开始吧';
      clearBtn.style.display = 'none';
    } else {
      emptyState.style.display = 'none';
      clearBtn.style.display = 'inline-flex';
    }

    searched.forEach(function(item) {
      var diffClass = item.difficulty === '简单' ? 'easy' : item.difficulty === '困难' ? 'hard' : '';
      var kps = parseKP(item.knowledge_points);
      var kpTags = kps.map(function(kp) { return '<span class="tag tag-kp">' + esc(kp) + '</span>'; }).join('');
      var nbName = getNbName(item.notebook_id);
      var card = document.createElement('div');
      card.className = 'mistake-card';
      card.innerHTML =
        '<div class="card-top">' +
        '<img class="card-thumb" src="' + (item.image_base64 || '') + '" alt="缩略图">' +
        '<div class="card-info">' +
        '<div class="card-ocr">' + esc(item.ocr_text || '(未识别到文字)') + '</div>' +
        '<div class="card-meta">' +
        '<span class="tag tag-notebook">' + esc(nbName) + '</span>' +
        '<span class="tag tag-subject">' + esc(item.subject || '未知学科') + '</span>' +
        '<span class="tag tag-difficulty ' + diffClass + '">' + esc(item.difficulty || '未知') + '</span>' +
        kpTags +
        '</div>' +
        '<div class="card-analysis">' + esc(item.analysis || '暂无分析') + '</div>' +
        '</div></div>' +
        '<div class="card-bottom">' +
        '<span class="card-time">' + formatDate(item.created_at) + '</span>' +
        '<div class="card-actions">' +
        '<button class="btn btn-outline btn-sm card-detail-btn">详情</button>' +
        '<button class="btn btn-danger btn-sm card-del-btn">删除</button>' +
        '</div></div>';
      grid.appendChild(card);

      card.querySelector('.card-thumb').addEventListener('click', function() {
        showImageModal(item.image_base64);
      });
      card.querySelector('.card-detail-btn').addEventListener('click', function() {
        showDetailModal(item);
      });
      card.querySelector('.card-del-btn').addEventListener('click', function() {
        if (confirm('确定删除这道错题？')) deleteQuestion(item.id);
      });
    });
  }

  document.getElementById('search-input').addEventListener('input', renderQuestionList);

  window.clearAll = async function() {
    var filtered = activeNotebookId === null ? questions : questions.filter(function(q) { return q.notebook_id === activeNotebookId; });
    if (filtered.length === 0) return;
    var msg = activeNotebookId !== null ? '确定清空该错题本的所有错题？' : '确定清空全部错题？';
    if (!confirm(msg)) return;
    if (supabaseClient && currentUser) {
      var query = supabaseClient.from('questions').delete().eq('user_id', currentUser.id);
      if (activeNotebookId !== null) query = query.eq('notebook_id', activeNotebookId);
      await query;
    }
    if (activeNotebookId !== null) {
      questions = questions.filter(function(q) { return q.notebook_id !== activeNotebookId; });
    } else {
      questions = [];
    }
    renderNotebookList(); renderQuestionList(); renderStats();
    showToast('已清空', 'success');
  };

  // ===== Detail Modal =====
  function showDetailModal(item) {
    var kps = parseKP(item.knowledge_points);
    var kpHtml = kps.map(function(kp) { return '<span class="tag tag-kp">' + esc(kp) + '</span>'; }).join('');
    var nbName = getNbName(item.notebook_id);
    var diffClass = item.difficulty === '简单' ? 'easy' : item.difficulty === '困难' ? 'hard' : '';
    var html =
      '<button class="modal-close" onclick="closeDetailModal()">&times;</button>' +
      '<h3>错题详情</h3>' +
      (item.image_base64 ? '<img class="detail-img" src="' + item.image_base64 + '" alt="原图">' : '') +
      '<div class="detail-section"><h4>📝 OCR 识别文字</h4><p>' + esc(item.ocr_text || '无') + '</p></div>' +
      '<div class="detail-section"><h4>🏷️ 分类信息</h4><div class="tag-row">' +
      '<span class="tag tag-notebook">' + esc(nbName) + '</span>' +
      '<span class="tag tag-subject">' + esc(item.subject || '未知') + '</span>' +
      '<span class="tag tag-difficulty ' + diffClass + '">' + esc(item.difficulty || '未知') + '</span>' +
      kpHtml + '</div></div>' +
      '<div class="detail-section"><h4>🔍 AI 分析</h4><p>' + esc(item.analysis || '暂无') + '</p></div>' +
      (item.error_reason ? '<div class="detail-section"><h4>❌ 错因分析</h4><p>' + esc(item.error_reason) + '</p></div>' : '') +
      (item.correct_approach ? '<div class="detail-section"><h4>✅ 正确思路</h4><p>' + esc(item.correct_approach) + '</p></div>' : '') +
      '<div class="detail-section" style="font-size:12px;color:var(--text-muted)">添加时间：' + formatDate(item.created_at) + '</div>';
    document.getElementById('detail-content').innerHTML = html;
    document.getElementById('detail-modal').classList.add('open');
  }

  window.closeDetailModal = function() {
    document.getElementById('detail-modal').classList.remove('open');
  };

  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDetailModal();
  });

  // ===== Stats =====
  function renderStats() {
    var grid = document.getElementById('stats-grid');
    var charts = document.getElementById('stats-charts');

    var total = questions.length;
    var subjects = {};
    var difficulties = { '简单': 0, '中等': 0, '困难': 0, '未知': 0 };
    var nbStats = {};
    var recentItems = questions.slice(0, 5);
    var todayCount = 0;
    var weekCount = 0;
    var now = new Date();
    var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    var weekStart = new Date(now.getTime() - 7 * 24 * 3600 * 1000).toISOString();

    questions.forEach(function(q) {
      subjects[q.subject || '未知'] = (subjects[q.subject || '未知'] || 0) + 1;
      difficulties[q.difficulty || '未知'] = (difficulties[q.difficulty || '未知'] || 0) + 1;
      var nbName = getNbName(q.notebook_id);
      nbStats[nbName] = (nbStats[nbName] || 0) + 1;
      if (q.created_at >= todayStart) todayCount++;
      if (q.created_at >= weekStart) weekCount++;
    });

    grid.innerHTML =
      '<div class="stat-card accent"><div class="stat-value">' + total + '</div><div class="stat-label">总错题数</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + todayCount + '</div><div class="stat-label">今日新增</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + weekCount + '</div><div class="stat-label">本周新增</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + Object.keys(subjects).length + '</div><div class="stat-label">涉及学科</div></div>';

    // Subject chart
    var maxSubject = Math.max.apply(null, Object.values(subjects).concat([1]));
    var subjectBars = Object.entries(subjects).sort(function(a,b) { return b[1] - a[1]; }).map(function(entry) {
      var pct = Math.round(entry[1] / maxSubject * 100);
      return '<div class="bar-row"><span class="bar-label">' + esc(entry[0]) + '</span><div class="bar-track"><div class="bar-fill blue" style="width:' + pct + '%"><span class="bar-count">' + entry[1] + '</span></div></div></div>';
    }).join('');

    // Difficulty chart
    var maxDiff = Math.max.apply(null, Object.values(difficulties).concat([1]));
    var diffColors = { '简单': 'green', '中等': 'orange', '困难': 'red', '未知': 'blue' };
    var diffBars = Object.entries(difficulties).filter(function(d) { return d[1] > 0; }).map(function(entry) {
      var pct = Math.round(entry[1] / maxDiff * 100);
      var color = diffColors[entry[0]] || 'blue';
      return '<div class="bar-row"><span class="bar-label">' + esc(entry[0]) + '</span><div class="bar-track"><div class="bar-fill ' + color + '" style="width:' + pct + '%"><span class="bar-count">' + entry[1] + '</span></div></div></div>';
    }).join('');

    // Notebook chart
    var maxNb = Math.max.apply(null, Object.values(nbStats).concat([1]));
    var nbBars = Object.entries(nbStats).sort(function(a,b) { return b[1] - a[1]; }).map(function(entry) {
      var pct = Math.round(entry[1] / maxNb * 100);
      return '<div class="bar-row"><span class="bar-label">' + esc(entry[0]) + '</span><div class="bar-track"><div class="bar-fill purple" style="width:' + pct + '%"><span class="bar-count">' + entry[1] + '</span></div></div></div>';
    }).join('');

    // Recent items
    var recentHtml = recentItems.map(function(q) {
      var dotColor = q.difficulty === '困难' ? '#ef4444' : q.difficulty === '简单' ? '#10b981' : '#f59e0b';
      return '<div class="recent-item"><span class="ri-dot" style="background:' + dotColor + '"></span><span class="ri-text">' + esc((q.ocr_text || '').slice(0, 40)) + '</span><span class="ri-time">' + formatDate(q.created_at) + '</span></div>';
    }).join('');

    charts.innerHTML =
      '<div class="chart-card"><h3>📊 学科分布</h3><div class="bar-chart">' + (subjectBars || '<div style="color:var(--text-muted);font-size:13px">暂无数据</div>') + '</div></div>' +
      '<div class="chart-card"><h3>📈 难度分布</h3><div class="bar-chart">' + (diffBars || '<div style="color:var(--text-muted);font-size:13px">暂无数据</div>') + '</div></div>' +
      '<div class="chart-card"><h3>📒 错题本分布</h3><div class="bar-chart">' + (nbBars || '<div style="color:var(--text-muted);font-size:13px">暂无数据</div>') + '</div></div>' +
      '<div class="chart-card"><h3>🕐 最近错题</h3><div class="recent-list">' + (recentHtml || '<div style="color:var(--text-muted);font-size:13px">暂无</div>') + '</div></div>';
  }

  // ===== Upload & Analyze =====
  var uploadZone = document.getElementById('upload-zone');
  var fileInput = document.getElementById('file-input');
  var previewArea = document.getElementById('preview-area');
  var previewImg = document.getElementById('preview-img');
  var previewSize = document.getElementById('preview-size');
  var loadingArea = document.getElementById('loading-area');
  var loadingText = document.getElementById('loading-text');

  uploadZone.addEventListener('click', function(e) { if (e.target === fileInput) return; fileInput.click(); });
  fileInput.addEventListener('change', function() { if (fileInput.files.length > 0) handleFile(fileInput.files[0]); });
  uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', function(e) { e.preventDefault(); uploadZone.classList.remove('drag-over'); });
  uploadZone.addEventListener('drop', function(e) {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (isProcessing) { showToast('正在处理中'); return; }
    if (!file.type.match(/image\/(jpeg|png|webp)/)) { showToast('仅支持 JPG/PNG/WebP'); return; }
    if (file.size > 10 * 1024 * 1024) { showToast('文件不能超过 10MB'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      currentImageBase64 = e.target.result;
      previewImg.src = currentImageBase64;
      previewSize.textContent = '大小：' + formatBytes(file.size);
      previewArea.classList.add('active');
      loadingArea.classList.remove('active');
    };
    reader.readAsDataURL(file);
  }

  window.resetPreview = function() {
    currentImageBase64 = null; previewImg.src = '';
    previewArea.classList.remove('active'); loadingArea.classList.remove('active');
    fileInput.value = '';
  };

  function compressImage(base64, maxW, quality) {
    return new Promise(function(resolve) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = function() { resolve(base64); };
      img.src = base64;
    });
  }

  async function ensureImageSize(b64) {
    var r = b64;
    if (b64.length > MAX_IMAGE_BASE64) r = await compressImage(b64, 1200, 0.7);
    if (r.length > MAX_IMAGE_BASE64) r = await compressImage(r, 800, 0.55);
    return r;
  }

  window.doAnalyze = async function() {
    if (!currentImageBase64) return;
    var targetNbId = activeNotebookId;
    if (!targetNbId && notebooks.length > 0) targetNbId = notebooks[0].id;
    if (!targetNbId) { showToast('请先创建或选择一个错题本'); return; }

    isProcessing = true;
    document.getElementById('analyze-btn').disabled = true;
    loadingArea.classList.add('active');

    try {
      // Step 1: Compress
      loadingText.textContent = '正在压缩图片...';
      var compressedForOCR = await ensureImageSize(currentImageBase64);

      // Step 2: OCR
      loadingText.textContent = '正在 OCR 识别...';
      var ocrResp = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: compressedForOCR })
      });
      if (!ocrResp.ok) {
        var errBody = await ocrResp.text();
        throw new Error('OCR 服务错误 (' + ocrResp.status + '): ' + errBody.slice(0, 200));
      }
      var ocrData = await ocrResp.json();
      var ocrText = '';
      if (ocrData && ocrData.text) { ocrText = ocrData.text.trim(); }
      else if (typeof ocrData === 'string') { ocrText = ocrData.trim(); }
      if (!ocrText) {
        showToast('未识别到文字，请确认截图清晰度');
        isProcessing = false; document.getElementById('analyze-btn').disabled = false; loadingArea.classList.remove('active'); return;
      }

      // Step 3: AI Analysis
      if (!apiKey) {
        await saveQuestion(targetNbId, compressedForOCR, ocrText, '未知', [], '未知', '（未配置 API Key，跳过分析）', '', '');
        showToast('OCR 完成（未配置 API Key）');
        resetPreview();
        isProcessing = false; document.getElementById('analyze-btn').disabled = false; loadingArea.classList.remove('active'); return;
      }

      loadingText.textContent = '正在 AI 分析...';
      var analysisPrompt = '你是一位专业的教育学辅导老师。请根据以下题目内容，进行深度分析。\n\n' +
        '题目文字：\n"""\n' + ocrText + '\n"""\n\n' +
        '请严格按以下 JSON 格式返回（不要加 markdown 代码块，只返回纯 JSON）：\n' +
        '{\n' +
        '  "subject": "学科名称",\n' +
        '  "knowledgePoints": ["知识点1", "知识点2"],\n' +
        '  "difficulty": "简单/中等/困难",\n' +
        '  "analysis": "题目的核心考点和解题关键（100字以内）",\n' +
        '  "errorReason": "学生可能做错的常见原因分析（80字以内）",\n' +
        '  "correctApproach": "正确的解题思路和步骤（150字以内）"\n' +
        '}\n\n' +
        '注意：\n' +
        '- knowledgePoints 列出1-3个最核心知识点\n' +
        '- errorReason 要具体，不要泛泛而谈\n' +
        '- correctApproach 要给出可操作的步骤';

      var aiResp = await fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: analysisPrompt }], temperature: 0.3, max_tokens: 1000 })
      });
      if (!aiResp.ok) {
        var errText = await aiResp.text();
        var errMsg = 'API 失败 (' + aiResp.status + ')';
        if (aiResp.status === 401) errMsg = 'API Key 无效';
        else if (aiResp.status === 402) errMsg = 'API 余额不足';
        else if (aiResp.status === 429) errMsg = '请求过于频繁，请稍后';
        throw new Error(errMsg);
      }
      var aiData = await aiResp.json();
      var content = (aiData.choices && aiData.choices[0] && aiData.choices[0].message && aiData.choices[0].message.content) || '';
      var parsed = null;
      try { parsed = JSON.parse(content); } catch(e) {}
      if (!parsed) {
        var m = content.match(/```(?:json)?\s*\n?([\s\S]*?)\n?```/) || content.match(/\{[\s\S]*\}/);
        if (m) { try { parsed = JSON.parse(m[0] || m[1]); } catch(e2) {} }
      }

      var subject = (parsed && parsed.subject) ? parsed.subject : '未知';
      var kps = (parsed && Array.isArray(parsed.knowledgePoints)) ? parsed.knowledgePoints : [];
      var difficulty = (parsed && parsed.difficulty) ? parsed.difficulty : '未知';
      var analysis = (parsed && parsed.analysis) ? parsed.analysis : '';
      var errorReason = (parsed && parsed.errorReason) ? parsed.errorReason : '';
      var correctApproach = (parsed && parsed.correctApproach) ? parsed.correctApproach : '';

      // Save
      loadingText.textContent = '正在保存...';
      var compressedImg = await ensureImageSize(currentImageBase64);
      await saveQuestion(targetNbId, compressedImg, ocrText, subject, kps, difficulty, analysis, errorReason, correctApproach);
      showToast('分析完成，已保存！', 'success');
      resetPreview();
    } catch(err) {
      console.error(err);
      showToast('分析失败：' + (err.message || '网络错误'), 'error');
    } finally {
      isProcessing = false;
      document.getElementById('analyze-btn').disabled = false;
      loadingArea.classList.remove('active');
    }
  };

  // ===== Image Modal =====
  function showImageModal(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('image-modal').classList.add('open');
  }
  document.getElementById('image-modal').addEventListener('click', function() {
    this.classList.remove('open');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('image-modal').classList.remove('open');
      closeDetailModal();
    }
  });

  // ===== Helpers =====
  function esc(s) {
    var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
  }
  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }
  function formatDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function pad(n) { return n < 10 ? '0' + n : n; }
  function parseKP(kp) {
    if (!kp) return [];
    if (Array.isArray(kp)) return kp;
    try { var p = JSON.parse(kp); return Array.isArray(p) ? p : []; } catch(e) { return []; }
  }
  function getNbName(nbId) {
    var nb = notebooks.find(function(n) { return n.id === nbId; });
    return nb ? nb.name : '未知';
  }

  // ===== Toast =====
  var toastTimer = null;
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (type ? ' ' + type : '');
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  // ===== Auth State Listener =====
  function init() {
    if (!initSupabase()) {
      // Show auth even if Supabase not configured - user will see error
    }

    supabaseClient.auth.onAuthStateChange(function(event, session) {
      if (session && session.user) {
        currentUser = session.user;
        showApp();
      } else {
        currentUser = null;
        showAuth();
      }
    });

    // Check current session
    supabaseClient.auth.getSession().then(function(result) {
      var session = result.data.session;
      if (session && session.user) {
        currentUser = session.user;
        showApp();
      } else {
        showAuth();
      }
    }).catch(function() {
      showAuth();
    });
  }

  init();
})();
</script>
